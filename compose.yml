services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    stop_grace_period: 5m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_sandbox_2}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      AUTH_API_DB_USER: ${AUTH_API_DB_USER:-auth_sandbox}
      AUTH_API_DB_PASSWORD: ${AUTH_API_DB_PASSWORD:-auth_sandbox}
      AUTH_API_DB_SCHEMA: ${AUTH_API_DB_SCHEMA:-auth_api}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KEYCLOAK_DB_SCHEMA: ${KEYCLOAK_DB_SCHEMA:-keycloak}
    volumes:
      - shared-postgres-data:/var/lib/postgresql/data
      - ./scripts/init-single-postgres.sh:/docker-entrypoint-initdb.d/10-init-single-postgres.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres} -d ${POSTGRES_DB:-auth_sandbox_2}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    build:
      context: .
      dockerfile: keycloak-extension/Dockerfile
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-auth_sandbox_2}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_DB_SCHEMA: ${KEYCLOAK_DB_SCHEMA:-keycloak}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: 'true'
      KC_HOSTNAME: https://keycloak.localhost:8443
      KC_HOSTNAME_ADMIN: https://keycloak.localhost:8443
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_BASE_URL: http://127.0.0.1:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-auth-sandbox-2}
      KEYCLOAK_INTERNAL_REDEEM_CLIENT_ID: ${KEYCLOAK_INTERNAL_REDEEM_CLIENT_ID:-auth-api-internal-redeem}
      KEYCLOAK_INTERNAL_REDEEM_CLIENT_SECRET: ${KEYCLOAK_INTERNAL_REDEEM_CLIENT_SECRET:-change-me-internal-redeem}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["start-dev", "--http-port=8080"]
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 30

  keycloak-config:
    image: ghcr.io/opentofu/opentofu:1.8.8
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-auth-sandbox-2}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      KEYCLOAK_BROWSER_CLIENT_SECRET: ${KEYCLOAK_BROWSER_CLIENT_SECRET:-change-me-browser}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-auth-api-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-change-me-admin}
      KEYCLOAK_INTERNAL_REDEEM_CLIENT_ID: ${KEYCLOAK_INTERNAL_REDEEM_CLIENT_ID:-auth-api-internal-redeem}
      KEYCLOAK_INTERNAL_REDEEM_CLIENT_SECRET: ${KEYCLOAK_INTERNAL_REDEEM_CLIENT_SECRET:-change-me-internal-redeem}
      MOCK_API_AUDIENCE: ${MOCK_API_AUDIENCE:-mock-api}
      TOFU_STATE_DIR: ${TOFU_STATE_DIR:-/state}
    depends_on:
      keycloak:
        condition: service_started
    volumes:
      - ./infra/tofu/keycloak:/workspace
      - tofu-state:${TOFU_STATE_DIR:-/state}
    working_dir: /workspace
    entrypoint: ["/bin/sh", "/workspace/run-keycloak-config.sh"]
    restart: on-failure

  auth-api:
    build:
      context: .
      dockerfile: apps/auth-api/Dockerfile
    environment:
      AUTH_API_HOST: 0.0.0.0
      AUTH_API_PORT: 3000
      AUTH_API_PUBLIC_URL: https://auth.localhost:8443
      AUTH_API_FLOW_TOKEN_SECRET: ${AUTH_API_FLOW_TOKEN_SECRET:-change-me-flow-token-secret}
      AUTH_API_APP_PROXY_TOKEN: ${AUTH_API_APP_PROXY_TOKEN:-change-me-app-proxy-token}
      AUTH_API_ADMIN_PROXY_TOKEN: ${AUTH_API_ADMIN_PROXY_TOKEN:-change-me-admin-proxy-token}
      OBSERVABILITY_SERVICE_NAME: auth-api
      OBSERVABILITY_WRITE_MODE: http
      TRACE_API_INTERNAL_URL: http://trace-api:3001
      DATABASE_URL: postgresql://${AUTH_API_DB_USER:-auth_sandbox}:${AUTH_API_DB_PASSWORD:-auth_sandbox}@postgres:5432/${POSTGRES_DB:-auth_sandbox_2}
      DATABASE_SCHEMA: ${AUTH_API_DB_SCHEMA:-auth_api}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: https://keycloak.localhost:8443
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-auth-sandbox-2}
      KEYCLOAK_CLIENT_ID: app-web
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      KEYCLOAK_BROWSER_CLIENT_ID: ${KEYCLOAK_BROWSER_CLIENT_ID:-browser-app}
      KEYCLOAK_BROWSER_CLIENT_SECRET: ${KEYCLOAK_BROWSER_CLIENT_SECRET:-change-me-browser}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-auth-api-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-change-me-admin}
      KEYCLOAK_INTERNAL_REDEEM_CLIENT_ID: ${KEYCLOAK_INTERNAL_REDEEM_CLIENT_ID:-auth-api-internal-redeem}
      AUTH_API_INTERNAL_URL: http://auth-api:3000
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      CORS_ORIGIN: https://app.localhost:8443,https://admin.localhost:8443,https://home.localhost:8443,https://mock.localhost:8443
      CI: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-config:
        condition: service_started

  trace-api:
    build:
      context: .
      dockerfile: apps/trace-api/Dockerfile
    environment:
      AUTH_API_HOST: 0.0.0.0
      AUTH_API_PORT: 3000
      AUTH_API_PUBLIC_URL: https://auth.localhost:8443
      TRACE_API_HOST: 0.0.0.0
      TRACE_API_PORT: 3001
      OBSERVABILITY_SERVICE_NAME: trace-api
      OBSERVABILITY_WRITE_MODE: direct
      TRACE_API_INTERNAL_URL: http://trace-api:3001
      DATABASE_URL: postgresql://${AUTH_API_DB_USER:-auth_sandbox}:${AUTH_API_DB_PASSWORD:-auth_sandbox}@postgres:5432/${POSTGRES_DB:-auth_sandbox_2}
      DATABASE_SCHEMA: ${AUTH_API_DB_SCHEMA:-auth_api}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: https://keycloak.localhost:8443
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-auth-sandbox-2}
      KEYCLOAK_CLIENT_ID: app-web
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      KEYCLOAK_BROWSER_CLIENT_ID: ${KEYCLOAK_BROWSER_CLIENT_ID:-browser-app}
      KEYCLOAK_BROWSER_CLIENT_SECRET: ${KEYCLOAK_BROWSER_CLIENT_SECRET:-change-me-browser}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-auth-api-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-change-me-admin}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      TRACE_API_BROWSER_PROXY_TOKEN: ${TRACE_API_BROWSER_PROXY_TOKEN:-change-me-trace-browser-token}
      TRACE_API_INTERNAL_WRITE_TOKEN: ${TRACE_API_INTERNAL_WRITE_TOKEN:-change-me-trace-internal-token}
      CORS_ORIGIN: https://app.localhost:8443,https://admin.localhost:8443,https://mock.localhost:8443
      CI: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-config:
        condition: service_started

  mock-api:
    build:
      context: .
      dockerfile: apps/mock-api/Dockerfile
    environment:
      MOCK_API_HOST: 0.0.0.0
      MOCK_API_PORT: 3002
      MOCK_API_PUBLIC_URL: https://mock.localhost:8443
      MOCK_API_AUDIENCE: mock-api
      OBSERVABILITY_SERVICE_NAME: mock-api
      OBSERVABILITY_WRITE_MODE: http
      TRACE_API_INTERNAL_URL: http://trace-api:3001
      TRACE_API_INTERNAL_WRITE_TOKEN: ${TRACE_API_INTERNAL_WRITE_TOKEN:-change-me-trace-internal-token}
      DATABASE_URL: postgresql://${AUTH_API_DB_USER:-auth_sandbox}:${AUTH_API_DB_PASSWORD:-auth_sandbox}@postgres:5432/${POSTGRES_DB:-auth_sandbox_2}
      DATABASE_SCHEMA: ${AUTH_API_DB_SCHEMA:-auth_api}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: https://keycloak.localhost:8443
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-auth-sandbox-2}
      CORS_ORIGIN: https://app.localhost:8443,https://admin.localhost:8443,https://mock.localhost:8443,https://home.localhost:8443
      CI: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-config:
        condition: service_started

  adminer:
    image: docker.io/library/adminer:4.8.1-standalone
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: docker.io/library/caddy:2.8.4-alpine
    ports:
      - "8088:80"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./local-certs:/etc/caddy/local-certs:ro
      - caddy-data:/data
      - caddy-config:/config
      - ./apps/app-web/dist:/srv/app-web:ro
      - ./apps/admin-web/dist:/srv/admin-web:ro
      - ./apps/trace-web/dist:/srv/trace-web:ro
      - ./apps/home-web/dist:/srv/home-web:ro
      - ./apps/mock-web/dist:/srv/mock-web:ro
      - ./runtime/caddy-logs:/var/log/caddy
    depends_on:
      - auth-api
      - mock-api
      - trace-api
      - adminer
      - keycloak

volumes:
  shared-postgres-data:
  tofu-state:
  caddy-data:
  caddy-config:
