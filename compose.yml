services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_sandbox_2}
      POSTGRES_USER: ${POSTGRES_USER:-auth_sandbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth_sandbox}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_sandbox} -d ${POSTGRES_DB:-auth_sandbox_2}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak-db:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    build:
      context: .
      dockerfile: keycloak-extension/Dockerfile
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: 'true'
      KC_HOSTNAME: https://keycloak.localhost:8443
      KC_HOSTNAME_ADMIN: https://keycloak.localhost:8443
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: xforwarded
    depends_on:
      keycloak-db:
        condition: service_healthy
    command: ["start-dev", "--http-port=8080"]
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 30

  keycloak-config:
    image: ghcr.io/opentofu/opentofu:1.8.8
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-auth-sandbox-2}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-auth-api-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-change-me-admin}
      TOFU_STATE_DIR: ${TOFU_STATE_DIR:-/state}
    depends_on:
      keycloak:
        condition: service_started
    volumes:
      - ./infra/tofu/keycloak:/workspace
      - tofu-state:${TOFU_STATE_DIR:-/state}
    working_dir: /workspace
    entrypoint: ["/bin/sh", "/workspace/run-keycloak-config.sh"]
    restart: unless-stopped

  auth-api:
    build:
      context: .
      dockerfile: apps/auth-api/Dockerfile
    environment:
      AUTH_API_HOST: 0.0.0.0
      AUTH_API_PORT: 3000
      AUTH_API_PUBLIC_URL: https://auth.localhost:8443
      DATABASE_URL: postgresql://${POSTGRES_USER:-auth_sandbox}:${POSTGRES_PASSWORD:-auth_sandbox}@postgres:5432/${POSTGRES_DB:-auth_sandbox_2}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: https://keycloak.localhost:8443
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-auth-sandbox-2}
      KEYCLOAK_CLIENT_ID: app-web
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-auth-api-admin}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-change-me-admin}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      CORS_ORIGIN: https://app.localhost:8443,https://admin.localhost:8443,https://home.localhost:8443
      CI: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-config:
        condition: service_started

  caddy:
    image: docker.io/library/caddy:2.8.4-alpine
    ports:
      - "8088:80"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - ./apps/app-web/dist:/srv/app-web:ro
      - ./apps/admin-web/dist:/srv/admin-web:ro
      - ./apps/home-web/dist:/srv/home-web:ro
    depends_on:
      - auth-api
      - keycloak

volumes:
  postgres-data:
  keycloak-db-data:
  tofu-state:
  caddy-data:
  caddy-config:
